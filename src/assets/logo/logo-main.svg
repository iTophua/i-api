<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="boltGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: Letter "i" with lightning bolt -->
  <g transform="translate(5, 5)">
    <!-- Background rounded square -->
    <rect x="0" y="0" width="50" height="50" rx="12" fill="url(#logoGradient)"/>
    
    <!-- Letter "i" dot -->
    <circle cx="25" cy="13" r="5" fill="white"/>
    
    <!-- Letter "i" stem combined with lightning bolt -->
    <path d="M22 22 L28 22 L26 35 L30 35 L20 50 L24 38 L18 38 Z" fill="url(#boltGradient)"/>
  </g>
  
  <!-- Text: iApi -->
  <g transform="translate(65, 12)">
    <!-- "i" in lowercase -->
    <text x="0" y="32" font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" font-weight="600" fill="#1F2937">
      <tspan fill="url(#logoGradient)">i</tspan><tspan fill="#1F2937">Api</tspan>
    </text>
  </g>
</svg>
