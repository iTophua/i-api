<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#7C3AED" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iApi - 轻量快速的 API 测试工具</title>
    <meta name="description" content="iApi 是一款轻量、快速、中文的 API 测试工具，专为国内开发者设计" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }
      
      #app {
        width: 100vw;
        height: 100vh;
      }
      
      .initial-loading {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
        overflow: hidden;
      }
      
      .loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }
      
      .loading-logo {
        width: 60px;
        height: 60px;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .loading-logo svg {
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 4px 20px rgba(99, 102, 241, 0.4));
      }
      
      .loading-text {
        font-size: 24px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 1px;
        animation: fadeIn 0.6s ease-out;
      }
      
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top: 3px solid #6366f1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }
      
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
      
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="initial-loading">
        <div class="loading-content">
          <div class="loading-logo">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="48" height="48" rx="12" fill="url(#gradient)" />
              <path d="M14 16L24 12L34 16V24L24 36L14 24V16Z" fill="white" fill-opacity="0.9" />
              <path d="M24 12V36M14 16L24 24L34 16" stroke="white" stroke-width="2" stroke-opacity="0.5" />
              <defs>
                <linearGradient id="gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#6366f1" />
                  <stop offset="1" stop-color="#8b5cf6" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="loading-text">iApi</div>
          <div class="loading-spinner"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
