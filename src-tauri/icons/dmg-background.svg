    <line x1="50" y1="0" x2="50" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="250" y1="0" x2="250" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="350" y1="0" x2="350" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#3b82f6" stroke-width="1"/>
    <line x1="550" y1="0" x2="550" y2="400" stroke="#3b82f6" stroke-width="1"/>
